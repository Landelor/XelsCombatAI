name: Validate Build References

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: read

concurrency:
  group: update-build-dependencies
  cancel-in-progress: false

jobs:
  update-build-dependencies:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
      XELS_WORKSPACE_DIR: ${{ github.workspace }}/..
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: bash
        run: |
          mkdir -p "$DALAMUD_HOME"
          curl -fsSL "https://goatcorp.github.io/dalamud-distrib/latest.zip" -o /tmp/dalamud.zip
          unzip -q -o /tmp/dalamud.zip -d "$DALAMUD_HOME"

      - name: Refresh reference checkouts
        run: scripts/update-build-dependencies.sh

      - name: Validate refreshed references
        run: scripts/test-and-build.sh
